<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle Financeiro Pessoal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #15803d;
      --green-light: #dcfce7;
      --red: #b91c1c;
      --red-light: #fee2e2;
      --dark: #111827;
      --gray: #6b7280;
      --gray-light: #f3f4f6;
      --border: #e5e7eb;
      --white: #ffffff;
      --blue: #2563eb;
      --blue-light: #eff6ff;
      --radius: 14px;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f1f5f9; color: var(--dark); min-height: 100vh; }

    /* ── LOADING ── */
    #loadingOverlay {
      position: fixed; inset: 0; background: #f1f5f9;
      display: flex; align-items: center; justify-content: center;
      z-index: 999; flex-direction: column; gap: 12px;
    }
    #loadingOverlay .emoji { font-size: 44px; }
    #loadingOverlay p { font-size: 15px; color: var(--gray); font-weight: 500; }

    /* ── AUTH SCREEN ── */
    #authScreen {
      display: none; min-height: 100vh;
      background: linear-gradient(135deg, #1e3a5f 0%, #111827 100%);
      align-items: center; justify-content: center; padding: 20px;
    }
    .auth-box {
      background: var(--white); border-radius: 20px;
      padding: 32px 28px; width: 100%; max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    .auth-logo { text-align: center; margin-bottom: 24px; }
    .auth-logo .icon { font-size: 48px; }
    .auth-logo h1 { font-size: 20px; font-weight: 800; margin-top: 8px; color: var(--dark); }
    .auth-logo p { font-size: 13px; color: var(--gray); margin-top: 4px; }

    .auth-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; background: var(--gray-light); border-radius: 10px; padding: 4px; margin-bottom: 24px; }
    .auth-tab { padding: 9px; border-radius: 8px; border: none; background: transparent; font-size: 14px; font-weight: 600; cursor: pointer; color: var(--gray); transition: all 0.15s; }
    .auth-tab.active { background: var(--white); color: var(--dark); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

    .auth-form { display: flex; flex-direction: column; gap: 14px; }
    .auth-form label { font-size: 13px; color: var(--gray); font-weight: 500; display: block; margin-bottom: 5px; }
    .auth-form input {
      width: 100%; border: 1.5px solid var(--border); border-radius: 10px;
      padding: 12px 14px; font-size: 15px; color: var(--dark);
      background: var(--white); transition: border-color 0.15s;
    }
    .auth-form input:focus { outline: none; border-color: var(--blue); }
    .auth-form input.error { border-color: var(--red); }
    .auth-error { font-size: 13px; color: var(--red); text-align: center; min-height: 18px; }
    .btn-auth {
      background: var(--blue); color: var(--white); border: none;
      border-radius: 10px; padding: 13px; font-size: 15px; font-weight: 700;
      cursor: pointer; margin-top: 4px; transition: background 0.15s;
    }
    .btn-auth:hover { background: #1d4ed8; }
    .btn-auth:disabled { background: #93c5fd; cursor: not-allowed; }

    /* ── HEADER ── */
    header {
      background: var(--dark); color: var(--white);
      padding: 16px 20px; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 100;
    }
    header h1 { font-size: 17px; font-weight: 700; }
    header p { font-size: 11px; color: #9ca3af; margin-top: 2px; }
    .btn-logout {
      background: rgba(255,255,255,0.1); border: none; color: var(--white);
      font-size: 12px; font-weight: 600; padding: 7px 12px; border-radius: 8px;
      cursor: pointer; transition: background 0.15s; white-space: nowrap;
    }
    .btn-logout:hover { background: rgba(255,255,255,0.2); }

    /* ── MAIN ── */
    main { max-width: 600px; margin: 0 auto; padding: 20px 16px 100px; }

    .month-bar {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      background: var(--white); border-radius: var(--radius); padding: 12px 16px;
      margin-bottom: 16px; box-shadow: var(--shadow);
    }
    .month-bar button { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--gray); padding: 4px 8px; border-radius: 8px; transition: background 0.15s; }
    .month-bar button:hover { background: var(--gray-light); }
    .month-bar span { font-size: 15px; font-weight: 600; min-width: 160px; text-align: center; }

    .summary { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .card { background: var(--white); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); }
    .card.balance { grid-column: 1 / -1; }
    .card-label { font-size: 12px; color: var(--gray); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .card-value { font-size: 22px; font-weight: 700; }
    .card-value.income { color: var(--green); }
    .card-value.expense { color: var(--red); }
    .card-value.positive { color: var(--green); }
    .card-value.negative { color: var(--red); }
    .card-value.neutral { color: var(--dark); }
    .card-icon { font-size: 24px; margin-bottom: 6px; }

    .btn-add {
      width: 100%; background: var(--blue); color: var(--white); border: none;
      border-radius: var(--radius); padding: 14px; font-size: 15px; font-weight: 600;
      cursor: pointer; margin-bottom: 16px; transition: background 0.15s, transform 0.1s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-add:hover { background: #1d4ed8; }
    .btn-add:active { transform: scale(0.98); }

    /* ── MODAL ── */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: flex-end; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--white); border-radius: var(--radius) var(--radius) 0 0; padding: 24px 20px; width: 100%; max-width: 600px; animation: slideUp 0.25s ease; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal h2 { font-size: 17px; font-weight: 700; margin-bottom: 20px; }

    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 13px; color: var(--gray); margin-bottom: 5px; font-weight: 500; }
    input, select { width: 100%; border: 1.5px solid var(--border); border-radius: 10px; padding: 11px 14px; font-size: 15px; color: var(--dark); background: var(--white); transition: border-color 0.15s; }
    input:focus, select:focus { outline: none; border-color: var(--blue); }

    .type-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .type-btn { padding: 10px; border-radius: 10px; border: 2px solid var(--border); background: var(--white); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; color: var(--gray); }
    .type-btn.income.active { border-color: var(--green); background: var(--green-light); color: var(--green); }
    .type-btn.expense.active { border-color: var(--red); background: var(--red-light); color: var(--red); }

    .form-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
    .btn-cancel { padding: 13px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--white); font-size: 15px; font-weight: 600; cursor: pointer; color: var(--gray); }
    .btn-save { padding: 13px; border-radius: 10px; border: none; background: var(--blue); color: var(--white); font-size: 15px; font-weight: 600; cursor: pointer; }
    .btn-save:hover { background: #1d4ed8; }

    /* ── LISTA ── */
    .section-title { font-size: 14px; font-weight: 700; color: var(--gray); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; padding-left: 4px; }
    .transaction-list { display: flex; flex-direction: column; gap: 8px; }
    .transaction-item { background: var(--white); border-radius: var(--radius); padding: 14px 16px; box-shadow: var(--shadow); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .transaction-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
    .transaction-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .transaction-icon.income { background: var(--green-light); }
    .transaction-icon.expense { background: var(--red-light); }
    .transaction-info { min-width: 0; }
    .transaction-desc { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .transaction-meta { font-size: 12px; color: var(--gray); margin-top: 2px; }
    .transaction-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .transaction-amount { font-size: 15px; font-weight: 700; }
    .transaction-amount.income { color: var(--green); }
    .transaction-amount.expense { color: var(--red); }
    .btn-delete { background: none; border: none; cursor: pointer; color: #d1d5db; font-size: 16px; padding: 4px; border-radius: 6px; transition: color 0.15s, background 0.15s; }
    .btn-delete:hover { color: var(--red); background: var(--red-light); }

    .empty-state { text-align: center; padding: 48px 20px; color: var(--gray); }
    .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }

    /* ── TOAST ── */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--dark); color: var(--white); padding: 12px 20px; border-radius: 12px; font-size: 14px; font-weight: 500; z-index: 999; transition: transform 0.3s ease; white-space: nowrap; }
    .toast.show { transform: translateX(-50%) translateY(0); }

    #appScreen { display: none; }

    @media (max-width: 400px) { .summary { grid-template-columns: 1fr; } .card.balance { grid-column: 1; } }
  </style>
</head>
<body>

<!-- LOADING -->
<div id="loadingOverlay">
  <div class="emoji">💰</div>
  <p>Carregando...</p>
</div>

<!-- AUTH SCREEN -->
<div id="authScreen" style="display:none; min-height:100vh; background:linear-gradient(135deg,#1e3a5f 0%,#111827 100%); align-items:center; justify-content:center; padding:20px;">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="icon">💰</div>
      <h1>Controle Financeiro</h1>
      <p>Pessoal</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Entrar</button>
      <button class="auth-tab" onclick="switchTab('register')">Cadastrar</button>
    </div>

    <!-- LOGIN -->
    <div id="loginForm" class="auth-form">
      <div>
        <label>CPF</label>
        <input type="text" id="loginCPF" placeholder="000.000.000-00" maxlength="14" oninput="maskCPF(this)" />
      </div>
      <div>
        <label>Senha</label>
        <input type="password" id="loginPass" placeholder="Sua senha" />
      </div>
      <div class="auth-error" id="loginError"></div>
      <button class="btn-auth" onclick="doLogin()">Entrar</button>
    </div>

    <!-- CADASTRO -->
    <div id="registerForm" class="auth-form" style="display:none">
      <div>
        <label>CPF</label>
        <input type="text" id="regCPF" placeholder="000.000.000-00" maxlength="14" oninput="maskCPF(this)" />
      </div>
      <div>
        <label>Senha <span style="color:#9ca3af;font-size:11px;">(mín. 6 caracteres)</span></label>
        <input type="password" id="regPass" placeholder="Crie uma senha" />
      </div>
      <div>
        <label>Confirmar Senha</label>
        <input type="password" id="regPass2" placeholder="Repita a senha" />
      </div>
      <div class="auth-error" id="registerError"></div>
      <button class="btn-auth" onclick="doRegister()">Criar conta</button>
    </div>
  </div>
</div>

<!-- APP SCREEN -->
<div id="appScreen">
  <header>
    <div>
      <h1>💰 Controle Financeiro</h1>
      <p id="headerUser">Pessoal</p>
    </div>
    <button class="btn-logout" onclick="doLogout()">Sair</button>
  </header>

  <main>
    <div class="month-bar">
      <button onclick="changeMonth(-1)">&#8249;</button>
      <span id="monthLabel"></span>
      <button onclick="changeMonth(1)">&#8250;</button>
    </div>

    <div class="summary">
      <div class="card">
        <div class="card-icon">📈</div>
        <div class="card-label">Receitas</div>
        <div class="card-value income" id="totalIncome">R$ 0,00</div>
      </div>
      <div class="card">
        <div class="card-icon">📉</div>
        <div class="card-label">Despesas</div>
        <div class="card-value expense" id="totalExpense">R$ 0,00</div>
      </div>
      <div class="card balance">
        <div class="card-label">Saldo do mês</div>
        <div class="card-value neutral" id="totalBalance">R$ 0,00</div>
      </div>
    </div>

    <button class="btn-add" onclick="openModal()"><span>＋</span> Novo Lançamento</button>

    <div class="section-title" id="sectionTitle">Lançamentos</div>
    <div class="transaction-list" id="transactionList"></div>
  </main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <h2>Novo Lançamento</h2>
    <div class="form-group">
      <label>Tipo</label>
      <div class="type-toggle">
        <button class="type-btn income active" id="btnIncome" onclick="setType('income')">+ Receita</button>
        <button class="type-btn expense" id="btnExpense" onclick="setType('expense')">− Despesa</button>
      </div>
    </div>
    <div class="form-group">
      <label for="desc">Descrição</label>
      <input type="text" id="desc" placeholder="Ex: Salário, Mercado..." maxlength="60" />
    </div>
    <div class="form-group">
      <label for="amount">Valor (R$)</label>
      <input type="number" id="amount" placeholder="0,00" min="0.01" step="0.01" />
    </div>
    <div class="form-group">
      <label for="category">Categoria</label>
      <select id="category">
        <option value="Salário">💼 Salário</option>
        <option value="Alimentação">🍔 Alimentação</option>
        <option value="Transporte">🚗 Transporte</option>
        <option value="Moradia">🏠 Moradia</option>
        <option value="Saúde">❤️ Saúde</option>
        <option value="Lazer">🎮 Lazer</option>
        <option value="Educação">📚 Educação</option>
        <option value="Outros">📦 Outros</option>
      </select>
    </div>
    <div class="form-group">
      <label for="date">Data</label>
      <input type="date" id="date" />
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveTransaction()">Salvar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
  // ── Firebase config ────────────────────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyD8P_B2oLnZ8hW6lxk0aI_kGLTTy9suZX8",
    authDomain: "controle-financeiro-51e82.firebaseapp.com",
    projectId: "controle-financeiro-51e82",
    storageBucket: "controle-financeiro-51e82.firebasestorage.app",
    messagingSenderId: "488968124645",
    appId: "1:488968124645:web:76ecb2ce365b8879207c0c"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db   = firebase.firestore();

  // ── Estado global ──────────────────────────────────
  let currentUser     = null;
  let allTransactions = [];
  let unsubscribe     = null;
  let currentType     = 'income';
  let currentYear     = new Date().getFullYear();
  let currentMonth    = new Date().getMonth();

  const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const CATEGORY_ICONS = { 'Salário':'💼','Alimentação':'🍔','Transporte':'🚗','Moradia':'🏠','Saúde':'❤️','Lazer':'🎮','Educação':'📚','Outros':'📦' };

  // ── Auth state observer ────────────────────────────
  auth.onAuthStateChanged(user => {
    document.getElementById('loadingOverlay').style.display = 'none';
    if (user) {
      currentUser = user;
      const cpf = user.email.replace('@controle-financeiro.app','');
      document.getElementById('headerUser').textContent = 'CPF: ' + formatCPFDisplay(cpf);
      showApp();
      subscribeTransactions();
    } else {
      currentUser = null;
      if (unsubscribe) { unsubscribe(); unsubscribe = null; }
      showAuth();
    }
  });

  // ── Auth helpers ───────────────────────────────────
  function cpfToEmail(cpf) {
    return cpf.replace(/\D/g,'') + '@controle-financeiro.app';
  }

  function formatCPFDisplay(digits) {
    return digits.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.***.***-**');
  }

  function maskCPF(input) {
    let v = input.value.replace(/\D/g,'').slice(0,11);
    v = v.replace(/(\d{3})(\d)/,'$1.$2');
    v = v.replace(/(\d{3})\.(\d{3})(\d)/,'$1.$2.$3');
    v = v.replace(/(\d{3})\.(\d{3})\.(\d{3})(\d)/,'$1.$2.$3-$4');
    input.value = v;
  }

  function validateCPF(cpf) {
    cpf = cpf.replace(/\D/g,'');
    if (cpf.length !== 11 || /^(\d)\1+$/.test(cpf)) return false;
    let s = 0;
    for (let i=0;i<9;i++) s += +cpf[i]*(10-i);
    let r = (s*10)%11; if(r>=10) r=0;
    if(r !== +cpf[9]) return false;
    s = 0;
    for (let i=0;i<10;i++) s += +cpf[i]*(11-i);
    r = (s*10)%11; if(r>=10) r=0;
    return r === +cpf[10];
  }

  // ── Tabs ───────────────────────────────────────────
  function switchTab(tab) {
    document.getElementById('loginForm').style.display    = tab==='login'    ? 'flex' : 'none';
    document.getElementById('registerForm').style.display = tab==='register' ? 'flex' : 'none';
    document.querySelectorAll('.auth-tab').forEach((b,i) => b.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
    document.getElementById('loginError').textContent    = '';
    document.getElementById('registerError').textContent = '';
  }

  // ── Login ──────────────────────────────────────────
  async function doLogin() {
    const cpf  = document.getElementById('loginCPF').value;
    const pass = document.getElementById('loginPass').value;
    const errEl = document.getElementById('loginError');
    errEl.textContent = '';

    if (!validateCPF(cpf)) { errEl.textContent = 'CPF inválido.'; return; }
    if (!pass)              { errEl.textContent = 'Informe a senha.'; return; }

    const btn = document.querySelector('#loginForm .btn-auth');
    btn.disabled = true; btn.textContent = 'Entrando...';

    try {
      await auth.signInWithEmailAndPassword(cpfToEmail(cpf), pass);
    } catch(e) {
      btn.disabled = false; btn.textContent = 'Entrar';
      if (e.code === 'auth/user-not-found' || e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential')
        errEl.textContent = 'CPF ou senha incorretos.';
      else
        errEl.textContent = 'Erro ao entrar. Tente novamente.';
    }
  }

  // ── Cadastro ───────────────────────────────────────
  async function doRegister() {
    const cpf   = document.getElementById('regCPF').value;
    const pass  = document.getElementById('regPass').value;
    const pass2 = document.getElementById('regPass2').value;
    const errEl = document.getElementById('registerError');
    errEl.textContent = '';

    if (!validateCPF(cpf))       { errEl.textContent = 'CPF inválido.'; return; }
    if (pass.length < 6)         { errEl.textContent = 'Senha deve ter no mínimo 6 caracteres.'; return; }
    if (pass !== pass2)          { errEl.textContent = 'As senhas não coincidem.'; return; }

    const btn = document.querySelector('#registerForm .btn-auth');
    btn.disabled = true; btn.textContent = 'Criando conta...';

    try {
      await auth.createUserWithEmailAndPassword(cpfToEmail(cpf), pass);
    } catch(e) {
      btn.disabled = false; btn.textContent = 'Criar conta';
      if (e.code === 'auth/email-already-in-use')
        errEl.textContent = 'Este CPF já possui cadastro. Faça login.';
      else
        errEl.textContent = 'Erro ao criar conta. Tente novamente.';
    }
  }

  // ── Logout ─────────────────────────────────────────
  async function doLogout() {
    if (!confirm('Deseja sair da sua conta?')) return;
    await auth.signOut();
  }

  // ── Telas ──────────────────────────────────────────
  function showApp() {
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('appScreen').style.display  = 'block';
  }
  function showAuth() {
    document.getElementById('authScreen').style.display = 'flex';
    document.getElementById('appScreen').style.display  = 'none';
    allTransactions = [];
  }

  // ── Firestore listener por usuário ─────────────────
  function subscribeTransactions() {
    if (unsubscribe) unsubscribe();
    unsubscribe = db.collection('users').doc(currentUser.uid)
      .collection('transactions')
      .orderBy('createdAt','desc')
      .onSnapshot(snap => {
        allTransactions = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        render();
      }, err => {
        console.error(err);
        showToast('⚠️ Erro de conexão com o banco de dados');
      });
  }

  function userTransCol() {
    return db.collection('users').doc(currentUser.uid).collection('transactions');
  }

  // ── Utilitários ────────────────────────────────────
  function formatMoney(v) {
    return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
  }
  function formatDate(iso) {
    return new Date(iso+'T00:00:00').toLocaleDateString('pt-BR');
  }
  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2500);
  }

  // ── Mês ────────────────────────────────────────────
  function changeMonth(dir) {
    currentMonth += dir;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    if (currentMonth < 0)  { currentMonth = 11; currentYear--; }
    render();
  }

  // ── Render ─────────────────────────────────────────
  function render() {
    document.getElementById('monthLabel').textContent = `${MONTHS[currentMonth]} ${currentYear}`;

    const list = allTransactions.filter(t => {
      const d = new Date(t.date+'T00:00:00');
      return d.getMonth()===currentMonth && d.getFullYear()===currentYear;
    }).sort((a,b) => new Date(b.date)-new Date(a.date));

    const income  = list.filter(t=>t.type==='income').reduce((s,t)=>s+Number(t.amount),0);
    const expense = list.filter(t=>t.type==='expense').reduce((s,t)=>s+Number(t.amount),0);
    const balance = income - expense;

    document.getElementById('totalIncome').textContent  = formatMoney(income);
    document.getElementById('totalExpense').textContent = formatMoney(expense);
    const balEl = document.getElementById('totalBalance');
    balEl.textContent = formatMoney(balance);
    balEl.className   = 'card-value ' + (balance>0?'positive':balance<0?'negative':'neutral');

    document.getElementById('sectionTitle').textContent = `Lançamentos${list.length ? ' ('+list.length+')' : ''}`;

    const container = document.getElementById('transactionList');
    if (!list.length) {
      container.innerHTML = `<div class="empty-state"><div class="emoji">📋</div><p>Nenhum lançamento este mês</p><small>Toque em "Novo Lançamento" para começar</small></div>`;
      return;
    }
    container.innerHTML = list.map(t => `
      <div class="transaction-item">
        <div class="transaction-left">
          <div class="transaction-icon ${t.type}">${CATEGORY_ICONS[t.category]||'📦'}</div>
          <div class="transaction-info">
            <div class="transaction-desc">${escHtml(t.description)}</div>
            <div class="transaction-meta">${escHtml(t.category)} · ${formatDate(t.date)}</div>
          </div>
        </div>
        <div class="transaction-right">
          <span class="transaction-amount ${t.type}">${t.type==='income'?'+':'−'} ${formatMoney(t.amount)}</span>
          <button class="btn-delete" onclick="deleteTransaction('${t.id}')" title="Excluir">✕</button>
        </div>
      </div>`).join('');
  }

  // ── Modal ──────────────────────────────────────────
  function openModal() {
    document.getElementById('desc').value   = '';
    document.getElementById('amount').value = '';
    document.getElementById('date').value   = new Date().toISOString().split('T')[0];
    document.getElementById('category').value = 'Salário';
    setType('income');
    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('desc').focus(), 300);
  }
  function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
  function handleOverlayClick(e) { if (e.target===document.getElementById('modalOverlay')) closeModal(); }
  function setType(type) {
    currentType = type;
    document.getElementById('btnIncome').classList.toggle('active', type==='income');
    document.getElementById('btnExpense').classList.toggle('active', type==='expense');
    const cat = document.getElementById('category');
    if (type==='income' && cat.value!=='Salário') cat.value='Salário';
    if (type==='expense' && cat.value==='Salário') cat.value='Alimentação';
  }

  // ── Salvar transação ───────────────────────────────
  async function saveTransaction() {
    const desc     = document.getElementById('desc').value.trim();
    const amount   = parseFloat(document.getElementById('amount').value);
    const category = document.getElementById('category').value;
    const date     = document.getElementById('date').value;

    if (!desc)            { showToast('Informe a descrição'); return; }
    if (!amount||amount<=0){ showToast('Informe um valor válido'); return; }
    if (!date)            { showToast('Informe a data'); return; }

    closeModal();
    const d = new Date(date+'T00:00:00');
    currentMonth = d.getMonth(); currentYear = d.getFullYear();

    try {
      await userTransCol().add({ type:currentType, description:desc, amount, category, date, createdAt:new Date().toISOString() });
      showToast(currentType==='income' ? '✅ Receita adicionada!' : '✅ Despesa adicionada!');
    } catch(e) {
      console.error(e); showToast('⚠️ Erro ao salvar — tente novamente');
    }
  }

  // ── Excluir transação ──────────────────────────────
  async function deleteTransaction(id) {
    if (!confirm('Excluir este lançamento?')) return;
    try {
      await userTransCol().doc(id).delete();
      showToast('🗑️ Lançamento excluído');
    } catch(e) {
      console.error(e); showToast('⚠️ Erro ao excluir');
    }
  }
</script>
</body>
</html>
