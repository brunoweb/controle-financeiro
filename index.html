<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle Financeiro Pessoal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #15803d;
      --green-light: #dcfce7;
      --red: #b91c1c;
      --red-light: #fee2e2;
      --dark: #111827;
      --gray: #6b7280;
      --gray-light: #f3f4f6;
      --border: #e5e7eb;
      --white: #ffffff;
      --blue: #2563eb;
      --blue-light: #eff6ff;
      --radius: 14px;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f1f5f9;
      color: var(--dark);
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: var(--dark);
      color: var(--white);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    header p { font-size: 12px; color: #9ca3af; margin-top: 2px; }

    /* MAIN */
    main { max-width: 600px; margin: 0 auto; padding: 20px 16px 100px; }

    /* MONTH SELECTOR */
    .month-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: var(--white);
      border-radius: var(--radius);
      padding: 12px 16px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }
    .month-bar button {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: var(--gray);
      line-height: 1;
      padding: 4px 8px;
      border-radius: 8px;
      transition: background 0.15s;
    }
    .month-bar button:hover { background: var(--gray-light); }
    .month-bar span { font-size: 15px; font-weight: 600; min-width: 160px; text-align: center; }

    /* SUMMARY CARDS */
    .summary { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
    }
    .card.balance { grid-column: 1 / -1; }
    .card-label {
      font-size: 12px;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .card-value { font-size: 22px; font-weight: 700; }
    .card-value.income { color: var(--green); }
    .card-value.expense { color: var(--red); }
    .card-value.positive { color: var(--green); }
    .card-value.negative { color: var(--red); }
    .card-value.neutral { color: var(--dark); }
    .card-icon { font-size: 24px; margin-bottom: 6px; }

    /* ADD BUTTON */
    .btn-add {
      width: 100%;
      background: var(--blue);
      color: var(--white);
      border: none;
      border-radius: var(--radius);
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 16px;
      transition: background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-add:hover { background: #1d4ed8; }
    .btn-add:active { transform: scale(0.98); }

    /* MODAL OVERLAY */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--white);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 24px 20px;
      width: 100%;
      max-width: 600px;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .modal h2 { font-size: 17px; font-weight: 700; margin-bottom: 20px; }

    /* FORM */
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 13px; color: var(--gray); margin-bottom: 5px; font-weight: 500; }
    input, select {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 15px;
      color: var(--dark);
      background: var(--white);
      transition: border-color 0.15s;
    }
    input:focus, select:focus { outline: none; border-color: var(--blue); }

    .type-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .type-btn {
      padding: 10px;
      border-radius: 10px;
      border: 2px solid var(--border);
      background: var(--white);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .type-btn.income.active { border-color: var(--green); background: var(--green-light); color: var(--green); }
    .type-btn.expense.active { border-color: var(--red); background: var(--red-light); color: var(--red); }
    .type-btn:not(.active) { color: var(--gray); }

    .form-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
    .btn-cancel {
      padding: 13px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: var(--white);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      color: var(--gray);
    }
    .btn-save {
      padding: 13px;
      border-radius: 10px;
      border: none;
      background: var(--blue);
      color: var(--white);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-save:hover { background: #1d4ed8; }

    /* TRANSACTIONS LIST */
    .section-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
      padding-left: 4px;
    }

    .transaction-list { display: flex; flex-direction: column; gap: 8px; }

    .transaction-item {
      background: var(--white);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .transaction-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
    .transaction-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .transaction-icon.income { background: var(--green-light); }
    .transaction-icon.expense { background: var(--red-light); }

    .transaction-info { min-width: 0; }
    .transaction-desc {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .transaction-meta {
      font-size: 12px;
      color: var(--gray);
      margin-top: 2px;
    }

    .transaction-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .transaction-amount {
      font-size: 15px;
      font-weight: 700;
    }
    .transaction-amount.income { color: var(--green); }
    .transaction-amount.expense { color: var(--red); }

    .btn-delete {
      background: none;
      border: none;
      cursor: pointer;
      color: #d1d5db;
      font-size: 16px;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
    }
    .btn-delete:hover { color: var(--red); background: var(--red-light); }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--gray);
    }
    .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; }
    .empty-state small { font-size: 13px; opacity: 0.7; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--dark);
      color: var(--white);
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      z-index: 999;
      transition: transform 0.3s ease;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 400px) {
      .summary { grid-template-columns: 1fr; }
      .card.balance { grid-column: 1; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>💰 Controle Financeiro</h1>
    <p>Pessoal</p>
  </div>
</header>

<main>

  <!-- MÊS -->
  <div class="month-bar">
    <button onclick="changeMonth(-1)">&#8249;</button>
    <span id="monthLabel"></span>
    <button onclick="changeMonth(1)">&#8250;</button>
  </div>

  <!-- RESUMO -->
  <div class="summary">
    <div class="card">
      <div class="card-icon">📈</div>
      <div class="card-label">Receitas</div>
      <div class="card-value income" id="totalIncome">R$ 0,00</div>
    </div>
    <div class="card">
      <div class="card-icon">📉</div>
      <div class="card-label">Despesas</div>
      <div class="card-value expense" id="totalExpense">R$ 0,00</div>
    </div>
    <div class="card balance">
      <div class="card-label">Saldo do mês</div>
      <div class="card-value neutral" id="totalBalance">R$ 0,00</div>
    </div>
  </div>

  <!-- BOTÃO ADICIONAR -->
  <button class="btn-add" onclick="openModal()">
    <span>＋</span> Novo Lançamento
  </button>

  <!-- LISTA DE TRANSAÇÕES -->
  <div class="section-title" id="sectionTitle">Lançamentos</div>
  <div class="transaction-list" id="transactionList"></div>

</main>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <h2>Novo Lançamento</h2>

    <div class="form-group">
      <label>Tipo</label>
      <div class="type-toggle">
        <button class="type-btn income active" id="btnIncome" onclick="setType('income')">+ Receita</button>
        <button class="type-btn expense" id="btnExpense" onclick="setType('expense')">− Despesa</button>
      </div>
    </div>

    <div class="form-group">
      <label for="desc">Descrição</label>
      <input type="text" id="desc" placeholder="Ex: Salário, Mercado..." maxlength="60" />
    </div>

    <div class="form-group">
      <label for="amount">Valor (R$)</label>
      <input type="number" id="amount" placeholder="0,00" min="0.01" step="0.01" />
    </div>

    <div class="form-group">
      <label for="category">Categoria</label>
      <select id="category">
        <option value="Salário">💼 Salário</option>
        <option value="Alimentação">🍔 Alimentação</option>
        <option value="Transporte">🚗 Transporte</option>
        <option value="Moradia">🏠 Moradia</option>
        <option value="Saúde">❤️ Saúde</option>
        <option value="Lazer">🎮 Lazer</option>
        <option value="Educação">📚 Educação</option>
        <option value="Outros">📦 Outros</option>
      </select>
    </div>

    <div class="form-group">
      <label for="date">Data</label>
      <input type="date" id="date" />
    </div>

    <div class="form-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveTransaction()">Salvar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- LOADING -->
<div id="loadingOverlay" style="position:fixed;inset:0;background:#f1f5f9;display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px;">
  <div style="font-size:40px;">💰</div>
  <div style="font-size:15px;color:#6b7280;font-weight:500;">Conectando ao banco de dados...</div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
  // ── Firebase config ──────────────────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyD8P_B2oLnZ8hW6lxk0aI_kGLTTy9suZX8",
    authDomain: "controle-financeiro-51e82.firebaseapp.com",
    projectId: "controle-financeiro-51e82",
    storageBucket: "controle-financeiro-51e82.firebasestorage.app",
    messagingSenderId: "488968124645",
    appId: "1:488968124645:web:76ecb2ce365b8879207c0c"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // Cache local atualizado pelo listener em tempo real
  let allTransactions = [];

  // Listener em tempo real — atualiza em TODOS os navegadores automaticamente
  db.collection('transactions')
    .orderBy('createdAt', 'desc')
    .onSnapshot(snapshot => {
      allTransactions = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      document.getElementById('loadingOverlay').style.display = 'none';
      render();
    }, err => {
      console.error('Firestore:', err);
      document.getElementById('loadingOverlay').style.display = 'none';
      showToast('⚠️ Erro de conexão — verifique sua internet');
    });

  function getTransactions() { return allTransactions; }

  async function dbAdd(transaction) {
    await db.collection('transactions').add(transaction);
  }

  async function dbDelete(id) {
    await db.collection('transactions').doc(id).delete();
  }

  let currentType = 'income';
  let currentYear = new Date().getFullYear();
  let currentMonth = new Date().getMonth();

  const MONTHS = [
    'Janeiro','Fevereiro','Março','Abril','Maio','Junho',
    'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'
  ];

  const CATEGORY_ICONS = {
    'Salário': '💼', 'Alimentação': '🍔', 'Transporte': '🚗',
    'Moradia': '🏠', 'Saúde': '❤️', 'Lazer': '🎮',
    'Educação': '📚', 'Outros': '📦'
  };

  function formatMoney(value) {
    return Number(value || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  }

  function formatDate(iso) {
    const d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString('pt-BR');
  }

  function changeMonth(dir) {
    currentMonth += dir;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    render();
  }

  function getMonthlyTransactions() {
    return getTransactions().filter(t => {
      const d = new Date(t.date + 'T00:00:00');
      return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
    });
  }

  function render() {
    // Month label
    document.getElementById('monthLabel').textContent = `${MONTHS[currentMonth]} ${currentYear}`;

    const list = getMonthlyTransactions();
    list.sort((a, b) => new Date(b.date) - new Date(a.date));

    const income = list.filter(t => t.type === 'income').reduce((s, t) => s + Number(t.amount), 0);
    const expense = list.filter(t => t.type === 'expense').reduce((s, t) => s + Number(t.amount), 0);
    const balance = income - expense;

    document.getElementById('totalIncome').textContent = formatMoney(income);
    document.getElementById('totalExpense').textContent = formatMoney(expense);

    const balanceEl = document.getElementById('totalBalance');
    balanceEl.textContent = formatMoney(balance);
    balanceEl.className = 'card-value ' + (balance > 0 ? 'positive' : balance < 0 ? 'negative' : 'neutral');

    const count = list.length;
    document.getElementById('sectionTitle').textContent =
      `Lançamentos ${count > 0 ? '(' + count + ')' : ''}`;

    const container = document.getElementById('transactionList');

    if (list.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="emoji">📋</div>
          <p>Nenhum lançamento este mês</p>
          <small>Toque em "Novo Lançamento" para começar</small>
        </div>`;
      return;
    }

    container.innerHTML = list.map(t => `
      <div class="transaction-item">
        <div class="transaction-left">
          <div class="transaction-icon ${t.type}">
            ${CATEGORY_ICONS[t.category] || '📦'}
          </div>
          <div class="transaction-info">
            <div class="transaction-desc">${escHtml(t.description)}</div>
            <div class="transaction-meta">${escHtml(t.category)} · ${formatDate(t.date)}</div>
          </div>
        </div>
        <div class="transaction-right">
          <span class="transaction-amount ${t.type}">
            ${t.type === 'income' ? '+' : '−'} ${formatMoney(t.amount)}
          </span>
          <button class="btn-delete" onclick="deleteTransaction('${t.id}')" title="Excluir">✕</button>
        </div>
      </div>
    `).join('');
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function openModal() {
    // Reset form
    document.getElementById('desc').value = '';
    document.getElementById('amount').value = '';
    document.getElementById('date').value = new Date().toISOString().split('T')[0];
    document.getElementById('category').value = 'Salário';
    setType('income');
    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('desc').focus(), 300);
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  }

  function setType(type) {
    currentType = type;
    document.getElementById('btnIncome').classList.toggle('active', type === 'income');
    document.getElementById('btnExpense').classList.toggle('active', type === 'expense');

    const catSelect = document.getElementById('category');
    if (type === 'income' && catSelect.value !== 'Salário') {
      catSelect.value = 'Salário';
    } else if (type === 'expense' && catSelect.value === 'Salário') {
      catSelect.value = 'Alimentação';
    }
  }

  async function saveTransaction() {
    const desc = document.getElementById('desc').value.trim();
    const amount = parseFloat(document.getElementById('amount').value);
    const category = document.getElementById('category').value;
    const date = document.getElementById('date').value;

    if (!desc) { showToast('Informe a descrição'); return; }
    if (!amount || amount <= 0) { showToast('Informe um valor válido'); return; }
    if (!date) { showToast('Informe a data'); return; }

    const transaction = {
      type: currentType,
      description: desc,
      amount: amount,
      category: category,
      date: date,
      createdAt: new Date().toISOString()
    };

    closeModal();

    // Navegar para o mês do lançamento
    const d = new Date(date + 'T00:00:00');
    currentMonth = d.getMonth();
    currentYear = d.getFullYear();

    try {
      await dbAdd(transaction);
      showToast(currentType === 'income' ? '✅ Receita adicionada!' : '✅ Despesa adicionada!');
    } catch(e) {
      console.error(e);
      showToast('⚠️ Erro ao salvar — tente novamente');
    }
  }

  async function deleteTransaction(id) {
    if (!confirm('Excluir este lançamento?')) return;
    try {
      await dbDelete(id);
      showToast('🗑️ Lançamento excluído');
    } catch(e) {
      console.error(e);
      showToast('⚠️ Erro ao excluir');
    }
  }

  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2500);
  }

  // Init
  render();
</script>
</body>
</html>
